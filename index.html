<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUSEFI-ISSEG - Inicio de Sesión</title>
    <style>
        :root {
            --azul-marino: #0B192C; /* Ligero toque azul marino oscuro para el fondo */
            --azul-principal: #1E3A8A; /* Azul corporativo */
            --azul-brillante: #3B82F6; /* Azul de enfoque y hover */
            --blanco: #FFFFFF;
            --gris-claro: #F8FAFC; /* Fondo sutil para inputs */
            --borde: #E2E8F0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--azul-marino) 0%, #1E293B 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--azul-marino);
        }

        .login-container {
            background-color: var(--blanco);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 400px;
            border-top: 6px solid var(--azul-principal);
        }

        .logo-zone {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-zone h1 {
            color: var(--azul-principal);
            margin: 0;
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 3px;
        }

        .logo-zone p {
            margin: 5px 0 0 0;
            color: #64748B;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #334155;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1.5px solid var(--borde);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: all 0.3s;
            background-color: var(--gris-claro);
        }

        input[type="text"]:focus, input[type="password"]:focus {
            border-color: var(--azul-brillante);
            background-color: var(--blanco);
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: var(--azul-principal);
            color: var(--blanco);
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: var(--azul-brillante);
        }

        .register-link {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: #64748B;
        }

        .register-link a {
            color: var(--azul-principal);
            text-decoration: none;
            font-weight: bold;
        }

        .register-link a:hover {
            text-decoration: underline;
            color: var(--azul-brillante);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-zone">
            <h1>SEFI</h1>
            <p>Sistema de Control y Auditoría Fiscal</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="usuario">Usuario / Correo Electrónico:</label>
                <input type="text" id="usuario" required placeholder="ejemplo@correo.com">
            </div>

            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-login">Ingresar al Sistema</button>
        </form>

        <div class="register-link">
            ¿No tienes cuenta? <a href="new_user.html">Registrarse aquí</a>
        </div>
    </div>

    <script>
        // Configuración para el nuevo proyecto SEFI
        // RECOMENDACIÓN: Recuerda actualizar estas variables con las credenciales de tu nuevo proyecto de Supabase
        const SUPABASE_URL = "https://ahblnfehtlyahtimrmve.supabase.co/rest/v1/usuarios";
        const SUPABASE_KEY = "sb_publishable_GhQjnvk_LouGCj3Lf7NuUA_h7ct-yJy";

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const usuarioInput = document.getElementById('usuario').value.trim().toLowerCase();
            const passwordInput = document.getElementById('password').value.trim();

            try {
                // Consulta directa a la tabla usuarios en tu nueva base de datos
                const response = await fetch(`${SUPABASE_URL}?usuario=eq.${encodeURIComponent(usuarioInput)}&password=eq.${encodeURIComponent(passwordInput)}`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });

                const usuariosEncontrados = await response.json();

                if (response.ok && usuariosEncontrados.length > 0) {
                    const usuarioActivo = usuariosEncontrados[0];
                    
                    // Almacenamiento local aislado para el ecosistema de SEFI
                    localStorage.setItem('sefi_sesion_activa', 'true');
                    localStorage.setItem('sefi_perfil', usuarioActivo.perfil);
                    localStorage.setItem('sefi_user_name', usuarioActivo.nombre_completo);
                    localStorage.setItem('sefi_user_area', usuarioActivo.area);
                    localStorage.setItem('sefi_user_puesto', usuarioActivo.puesto);

                    alert(`¡Bienvenido al sistema SEFI!\nSesión iniciada como: ${usuarioActivo.nombre_completo}`);
                    
                    // Redirección al nuevo menú principal
                    window.location.href = "menu.html";
                } else {
                    alert("Credenciales incorrectas. Verifique su usuario y contraseña.");
                }

            } catch (error) {
                console.error("Error de conexión:", error);
                alert("Error de red al intentar conectar con el servidor de SEFI.");
            }
        });
    </script>
</body>
</html>
